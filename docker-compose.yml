services:

  # Relational Database: PostgreSQL 17
  postgres:
    image: postgres:17-alpine
    container_name: social-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: social_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db_init.sql:/docker-entrypoint-initdb.d/db_init.sql

  # In-Memory Cache and Broker: Redis
  redis:
    image: redis:7-alpine
    container_name: social-ai-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Vector Database: Qdrant
  qdrant:
    image: qdrant/qdrant:latest
    container_name: social-ai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage

  # Local S3-Compatible Object Storage: MinIO
  minio:
    image: minio/minio:latest
    container_name: social-ai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API Port
      - "9001:9001" # Web UI Console Port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  # Automation Workflow Engine: n8n
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: social-ai-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - NODE_ENV=production
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  n8n_data: